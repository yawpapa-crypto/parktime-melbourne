services:
  db:
    image: postgis/postgis:16-3.4
    container_name: parktime-postgis
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-parktime}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-parktime}
      POSTGRES_DB: ${POSTGRES_DB:-parktime}
    ports:
      - "5432:5432"
    volumes:
      - parktime_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-parktime}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  parktime_pgdata:
